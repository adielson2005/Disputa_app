<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &bull; Disputa App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="login-body">

  <div class="login-container">

    <!-- BANNER (só desktop) -->
    <div class="login-banner d-none d-lg-flex">
      <div>
        <h1>Organize seus campeonatos.</h1>
        <p>Ranking, partidas, estatísticas e competição em um só lugar.</p>
      </div>
    </div>

    <!-- FORMULÁRIO -->
    <div class="login-content">
      <div class="login-box">

        <div class="login-logo">
          <i class="bi bi-trophy-fill"></i>
          <h3>Disputa App</h3>
        </div>

        <form>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control custom-input" placeholder="Digite seu email">
          </div>
          <div class="mb-4">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control custom-input" placeholder="Digite sua senha">
          </div>
          <button class="btn-login" type="submit">Entrar</button>
        </form>

        <div class="divider"><span>ou</span></div>

        <button class="btn-google">
          <i class="bi bi-google"></i>
          Continuar com Google
        </button>

      </div>
    </div>

  </div>

</body>
</html>
